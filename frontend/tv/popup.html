<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AIR 팝업</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: transparent;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 100vh;
      padding-bottom: 60px;
    }

    .popup {
      background: linear-gradient(135deg, rgba(108,99,255,0.95), rgba(255,101,132,0.95));
      border-radius: 16px;
      padding: 24px 32px;
      max-width: 580px;
      width: 90%;
      display: flex;
      align-items: center;
      gap: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .popup-icon { font-size: 2.5rem; }

    .popup-text { flex: 1; }
    .popup-title { font-size: 1.15rem; font-weight: 700; color: white; margin-bottom: 4px; }
    .popup-sub   { font-size: 0.85rem; color: rgba(255,255,255,0.85); }

    .popup-btns { display: flex; flex-direction: column; gap: 8px; }

    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 700;
      border: none; cursor: pointer;
      text-align: center; min-width: 110px;
      transition: transform 0.1s;
    }
    .btn.focused {
      outline: 3px solid white;
      transform: scale(1.04);
    }
    .btn-ok { background: white; color: #6C63FF; }
    .btn-no { background: rgba(255,255,255,0.2); color: white; }
  </style>
</head>
<body>
<div id="app">
  <div class="popup" v-if="visible">
    <div class="popup-icon">🛍</div>
    <div class="popup-text">
      <div class="popup-title">'{{ title }}'에 나온 상품을 찾았어요!</div>
      <div class="popup-sub">AI가 {{ productCount }}개 상품을 인식했어요. 지금 바로 확인해보세요.</div>
    </div>
    <div class="popup-btns">
      <button class="btn btn-ok" :class="{ focused: focusIndex === 0 }" @click="openShop">지금 보기</button>
      <button class="btn btn-no" :class="{ focused: focusIndex === 1 }" @click="close">닫기</button>
    </div>
  </div>
</div>

<script>
const { createApp, ref, onMounted, onUnmounted } = Vue;

createApp({
  setup() {
    const API_BASE = "http://localhost:8000";

    const visible      = ref(false);
    const title        = ref("");
    const productCount = ref(0);
    const webappUrl    = ref("");
    const focusIndex   = ref(0);

    async function loadPopup() {
      try {
        const res  = await fetch(`${API_BASE}/api/popup/latest`);
        const data = await res.json();
        if (data.popup) {
          title.value        = data.popup.title;
          productCount.value = data.popup.product_count;
          webappUrl.value    = API_BASE + data.popup.webapp_url;
          visible.value      = true;
        }
      } catch (e) {
        console.error("팝업 로드 실패:", e);
      }
    }

    function openShop() {
      if (webappUrl.value) window.location.href = webappUrl.value;
    }

    function close() {
      visible.value = false;
    }

    function onKeydown(e) {
      if (!visible.value) return;
      if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
        focusIndex.value = (focusIndex.value - 1 + 2) % 2;
      } else if (e.key === "ArrowDown" || e.key === "ArrowRight") {
        focusIndex.value = (focusIndex.value + 1) % 2;
      } else if (e.key === "Enter" || e.key === " ") {
        focusIndex.value === 0 ? openShop() : close();
      }
    }

    onMounted(() => {
      loadPopup();
      window.addEventListener("keydown", onKeydown);
    });

    onUnmounted(() => {
      window.removeEventListener("keydown", onKeydown);
    });

    return { visible, title, productCount, focusIndex, openShop, close };
  }
}).mount("#app");
</script>
</body>
</html>
